name: Deploy Website

on:
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build core
        run: bun run build
        working-directory: packages/core

      - name: Build cloudflare SDK
        run: bun run build
        working-directory: packages/cloudflare

      - name: Deploy website
        run: bun run deploy
        working-directory: www/distilled.cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.WEBSITE_CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.WEBSITE_CLOUDFLARE_ACCOUNT_ID }}
          ZONE_ID: ${{ secrets.WEBSITE_CLOUDFLARE_ZONE_ID }}
